name: Frontend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: resort    

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: resort/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build



👉 This way, your pipeline will use the correct Node version and run a proper production build instead of hanging on npm run dev.
